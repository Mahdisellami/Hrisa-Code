services:
  # Ollama Service (Custom Docker)
  - type: pserv
    name: hrisa-ollama
    runtime: docker
    repo: https://github.com/Mahdisellami/Hrisa-Code.git
    dockerfilePath: ./docker/Dockerfile.ollama
    plan: standard
    envVars:
      - key: OLLAMA_HOST
        value: "0.0.0.0"
      - key: OLLAMA_MODELS
        value: "qwen2.5-coder:7b"
    disk:
      name: ollama-models
      mountPath: /root/.ollama
      sizeGB: 20

  # Backend API (FastAPI)
  - type: web
    name: hrisa-backend
    runtime: python
    repo: https://github.com/Mahdisellami/Hrisa-Code.git
    buildCommand: pip install -e ".[web]"
    startCommand: uvicorn hrisa_code.web.server:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OLLAMA_HOST
        fromService:
          name: hrisa-ollama
          type: pserv
          property: host
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: RELOAD
        value: "false"
      - key: MAX_CONCURRENT_AGENTS
        value: "5"
      - key: STUCK_THRESHOLD_SECONDS
        value: "120"
      - key: WEBHOOK_TIMEOUT_SECONDS
        value: "10"
      - key: MAX_WEBHOOK_RETRIES
        value: "0"
      - key: ENABLE_WEBHOOK_SIGNATURES
        value: "true"
      - key: LOG_LEVEL
        value: "INFO"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /health
    autoDeploy: true


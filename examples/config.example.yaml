# Hrisa Code Configuration Example
# Copy this file to ~/.config/hrisa-code/config.yaml or .hrisa/config.yaml

model:
  name: qwen2.5:72b  # Or: qwen2.5-coder:32b, deepseek-coder, mistral, llama2, etc.
  temperature: 0.7   # Creativity level (0.0 - 2.0)
  top_p: 0.9         # Nucleus sampling parameter
  top_k: 40          # Top-k sampling parameter

ollama:
  host: http://localhost:11434  # Ollama server URL
  timeout: 300                  # Request timeout in seconds

tools:
  enable_file_operations: true    # Allow reading/writing files
  enable_command_execution: true  # Allow executing shell commands
  enable_search: true             # Allow searching files
  command_timeout: 30             # Command execution timeout (seconds)
  max_file_size_mb: 10            # Maximum file size to read (MB)

# Optional custom system prompt
# system_prompt: |
#   You are a helpful coding assistant...

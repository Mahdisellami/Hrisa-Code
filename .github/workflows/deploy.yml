name: Deploy to Vercel and Render

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Run linting
        run: |
          ruff check src/ tests/
          black --check src/ tests/

      - name: Run type checking
        run: mypy src/
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ --cov=hrisa_code --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  deploy-backend:
    name: Trigger Render Deployment
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Deployment
        run: |
          echo "Backend deployment triggered on Render"
          echo "Check status at: https://dashboard.render.com"

  notify:
    name: Send Deployment Notification
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send Slack Notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ needs.deploy-frontend.result == 'success' && needs.deploy-backend.result == 'success' && 'success' || 'failure' }}"
          COLOR="${{ needs.deploy-frontend.result == 'success' && needs.deploy-backend.result == 'success' && '#00FF00' || '#FF0000' }}"

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"Deployment ${STATUS}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Deployment ${STATUS}*\n\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\n\nFrontend: ${{ needs.deploy-frontend.result }}\nBackend: ${{ needs.deploy-backend.result }}\"
                  }
                }
              ]
            }"
        continue-on-error: true

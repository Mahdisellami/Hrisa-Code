version: '3.8'

services:
  # Ollama service for running local LLMs
  ollama:
    image: ollama/ollama:latest
    container_name: hrisa-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist Ollama models (they're large!)
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # For GPU support (NVIDIA), uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - hrisa-network

  # Hrisa Code CLI application
  hrisa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrisa-code
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      # Mount your workspace (the code you want to work on)
      - ./workspace:/workspace
      # Persist configuration
      - hrisa_config:/home/hrisa/.config/hrisa-code
      # Persist conversation history
      - hrisa_history:/home/hrisa/.hrisa
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # Verification settings
      - REQUIRED_MODELS=qwen2.5-coder:7b,llama3.2:latest
      - AUTO_PULL_MODELS=false
      - SKIP_VERIFICATION=false
    stdin_open: true
    tty: true
    networks:
      - hrisa-network
    # Override to run interactive chat
    command: hrisa chat --model codellama
    profiles:
      - cli

  # PostgreSQL database for authentication
  postgres:
    image: postgres:16-alpine
    container_name: hrisa-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=hrisa
      - POSTGRES_PASSWORD=hrisa_password
      - POSTGRES_DB=hrisa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrisa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - hrisa-network

  # Hrisa Code Web UI
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hrisa-web
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for live reloading
      - ./src:/app/src
      # Mount workspace for agents to access files
      - ./workspace:/workspace
      # Persist configuration
      - hrisa_config:/home/hrisa/.config/hrisa-code
      # Persist conversation history
      - hrisa_history:/home/hrisa/.hrisa
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # Verification settings
      - REQUIRED_MODELS=qwen2.5-coder:7b,llama3.2:latest
      - AUTO_PULL_MODELS=false
      - SKIP_VERIFICATION=false
      # Database configuration
      - DATABASE_URL=postgresql://hrisa:hrisa_password@postgres:5432/hrisa
      # SMTP configuration (set in .env file)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@hrisa.local}
      # Application configuration
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000}
    networks:
      - hrisa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Helper service to pull models
  ollama-pull:
    image: ollama/ollama:latest
    container_name: hrisa-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - hrisa-network
    entrypoint: /bin/sh
    command: -c "ollama pull qwen2.5-coder:7b && ollama pull llama3.2:latest"
    profiles:
      - setup

  # Verification service
  verify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrisa-verify
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./workspace:/workspace
      - hrisa_config:/home/hrisa/.config/hrisa-code
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REQUIRED_MODELS=qwen2.5-coder:7b,llama3.2:latest
    networks:
      - hrisa-network
    command: check
    profiles:
      - verify

volumes:
  ollama_data:
    driver: local
  hrisa_config:
    driver: local
  hrisa_history:
    driver: local
  postgres_data:
    driver: local

networks:
  hrisa-network:
    driver: bridge
